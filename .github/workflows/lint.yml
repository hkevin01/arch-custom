name: Lint
on: [push, pull_request]
jobs:
  line-limit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce 500-line cap on shell scripts
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            lines=$(wc -l < "$f")
            if (( lines > 500 )); then
              echo "OVER LIMIT: $f ($lines lines)"
              fail=1
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*" -print0)
          exit $fail
